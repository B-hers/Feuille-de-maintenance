<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Maintenance Onduleur — We Green Energy</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f4f4f0;color:#1a1a1a;font-size:14px}
input,select,textarea{font-family:inherit;font-size:13px;padding:6px 10px;border:1px solid #d0d0c8;border-radius:6px;background:#fff;color:#1a1a1a;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:#1B6B3A}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
button{font-family:inherit;cursor:pointer}
@media print{
  @page{size:A4 portrait;margin:12mm 14mm}
  body{background:white}
  #no-print{display:none!important}
  #preview-doc{display:block!important;padding:0!important;max-width:100%!important}
  .pv-table{font-size:11px}
  .page-break{page-break-before:always}
}
.pv-table{width:100%;border-collapse:collapse;font-size:13px}
.pv-table td,.pv-table th{padding:5px 9px;border:.5px solid #ccc}
.pv-table th{background:#f0f7f2;font-weight:600;text-align:left;color:#1B6B3A;width:38%}
.ms-table{width:100%;border-collapse:collapse;font-size:12px}
.ms-table th{background:#1B6B3A;color:#fff;padding:6px 10px;text-align:left;font-weight:600}
.ms-table td{border:.5px solid #d0d0c8;padding:4px 8px}
.ms-table tr:nth-child(even) td{background:#f8faf8}
@media(max-width:640px){
  body{font-size:15px}
  input,select,textarea{font-size:16px!important;padding:11px 12px;border-radius:8px;width:100%}
  button{min-height:44px}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect}=React;
const G="#1B6B3A",GL="#f0f7f2",GM="#d4ead9",BD="#d0d0c8",BG="#f4f4f0",W="#ffffff",MU="#666660";
const RD="#c0392b",BL="#2980b9",OR="#e07b00",AM="#f39c12";
const CARD={background:W,border:`1px solid ${BD}`,borderRadius:10,padding:"1rem 1.25rem"};
const SH={fontSize:11,fontWeight:700,color:G,textTransform:"uppercase",letterSpacing:"0.07em",paddingBottom:8,borderBottom:`1px solid ${GM}`,marginBottom:14};
const LBL={fontSize:12,color:MU,fontWeight:500,marginBottom:4,display:"block"};
const G2={display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:12};

const SU="https://brodjywccrirlzplovxg.supabase.co";
const SK="sb_publishable_T4Syy3Nq5mLK0yqOUNgtEg_od2WUXEY";
async function supaLoad(ref){
  try{const r=await fetch(SU+"/rest/v1/maintenance_onduleur?ref=eq."+encodeURIComponent(ref)+"&select=data,updated_at",{headers:{"apikey":SK,"Authorization":"Bearer "+SK}});const d=await r.json();if(d&&d.length)return d[0];}catch(e){}return null;
}
async function supaSave(ref,data){
  try{await fetch(SU+"/rest/v1/maintenance_onduleur",{method:"POST",headers:{"apikey":SK,"Authorization":"Bearer "+SK,"Content-Type":"application/json","Prefer":"resolution=merge-duplicates"},body:JSON.stringify({ref,data,updated_at:new Date().toISOString()})});return true;}catch(e){return false;}
}

/* ── Field ── */
function Field({label,value,onChange,placeholder="",type="text",unit}){
  return(
    <div>
      {label&&<label style={LBL}>{label}</label>}
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{flex:1,minWidth:0}}/>
        {unit&&<span style={{fontSize:12,color:MU,whiteSpace:"nowrap"}}>{unit}</span>}
      </div>
    </div>
  );
}

/* ── Toggle OUI/NON ── */
function Toggle({value,onChange}){
  return(
    <div style={{display:"flex",gap:5}}>
      {["OUI","NON"].map(o=>(
        <button key={o} onClick={()=>onChange(value===o?null:o)} style={{
          padding:"5px 12px",borderRadius:6,fontSize:13,fontWeight:value===o?700:400,cursor:"pointer",
          border:`1px solid ${value===o?(o==="OUI"?G:RD):BD}`,
          background:value===o?(o==="OUI"?GL:"#fdf0f0"):W,
          color:value===o?(o==="OUI"?G:RD):MU
        }}>{o}</button>
      ))}
    </div>
  );
}

/* ── Chip ── */
function Chip({label,selected,color,onClick}){
  const c=color||G;
  return(
    <button onClick={onClick} style={{
      padding:"5px 12px",borderRadius:6,fontSize:13,fontWeight:selected?700:400,cursor:"pointer",
      border:`1px solid ${selected?c:BD}`,
      background:selected?c:W,
      color:selected?W:MU
    }}>{label}</button>
  );
}

/* ── PhotoZone ── */
function PhotoZone({label,items,onAdd,onDelete,single}){
  const [drag,setDrag]=useState(false);
  const rf=useRef(),rc=useRef(),zr=useRef();
  const mob=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  const compress=blob=>new Promise(res=>{
    const img=new Image(),url=URL.createObjectURL(blob);
    img.onload=()=>{
      const M=1000;let w=img.width,h=img.height;
      if(w>h){if(w>M){h=Math.round(h*M/w);w=M;}}else{if(h>M){w=Math.round(w*M/h);h=M;}}
      const c=document.createElement("canvas");c.width=w;c.height=h;
      const x=c.getContext("2d");x.fillStyle="#fff";x.fillRect(0,0,w,h);x.drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);res(c.toDataURL("image/jpeg",0.72));
    };
    img.onerror=()=>{URL.revokeObjectURL(url);res(null);};
    img.src=url;
  });
  const handleFiles=async files=>{
    let arr=Array.from(files).filter(f=>f.type.startsWith("image/"));
    if(single)arr=arr.slice(0,1);
    const result=[];
    for(const f of arr){const url=await compress(f);result.push({name:f.name,url});}
    onAdd(result);
  };
  const handlePaste=async e=>{
    const imgs=Array.from(e.clipboardData?.items||[]).filter(i=>i.type.startsWith("image/"));
    if(!imgs.length)return;e.preventDefault();
    const result=[];
    for(const i of imgs.slice(0,single?1:99)){const url=await compress(i.getAsFile());result.push({name:"img.jpg",url});}
    onAdd(result);
  };
  const show=single?items.slice(0,1):items;
  return(
    <div>
      {label&&<div style={{...LBL,marginBottom:5}}>{label}{!single&&items.length>0&&<span style={{color:G,fontWeight:600}}> ({items.length})</span>}</div>}
      <div ref={zr} tabIndex={0} onPaste={handlePaste}
        onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
        onDrop={e=>{e.preventDefault();setDrag(false);handleFiles(e.dataTransfer.files);}}
        style={{border:`1.5px dashed ${drag?G:BD}`,background:drag?GL:BG,borderRadius:8,padding:8,minHeight:single?90:52,outline:"none"}}>
        {mob&&(!single||items.length===0)&&(
          <div style={{display:"flex",gap:6,marginBottom:show.length?8:0}}>
            <button onClick={()=>rc.current?.click()} style={{flex:1,background:G,color:W,border:"none",borderRadius:7,padding:"7px",fontSize:13,fontWeight:600}}>📷 {single?"Fiche":"Photo"}</button>
            <button onClick={()=>rf.current?.click()} style={{flex:1,background:W,color:G,border:`1.5px solid ${G}`,borderRadius:7,padding:"7px",fontSize:13,fontWeight:600}}>🖼 Galerie</button>
          </div>
        )}
        {!mob&&show.length===0&&(
          <div style={{height:single?72:36,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4}}>
            {single&&<span style={{fontSize:20}}>📷</span>}
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <span onClick={()=>rf.current?.click()} style={{fontSize:12,color:G,cursor:"pointer",textDecoration:"underline"}}>Parcourir</span>
              <span style={{fontSize:12,color:"#ccc"}}>|</span>
              <span style={{fontSize:12,color:"#aaa"}}>Drop / Ctrl+V</span>
            </div>
          </div>
        )}
        {show.length>0&&(
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {show.map((item,i)=>{
              const sz=single?80:56;
              return(
                <div key={i} style={{position:"relative",flexShrink:0}}>
                  <img src={item.url} alt={item.name} style={{width:sz,height:sz,objectFit:"cover",borderRadius:6,border:`1px solid ${BD}`,display:"block"}}/>
                  <button onClick={()=>onDelete(i)} style={{position:"absolute",top:-5,right:-5,width:17,height:17,borderRadius:"50%",background:"#e74c3c",color:W,border:"none",cursor:"pointer",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                </div>
              );
            })}
            {!single&&<div onClick={()=>rf.current?.click()} style={{width:56,height:56,display:"flex",alignItems:"center",justifyContent:"center",border:`1.5px dashed ${BD}`,borderRadius:6,cursor:"pointer",fontSize:20,color:MU}}>+</div>}
          </div>
        )}
      </div>
      <input ref={rc} type="file" multiple={!single} accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>handleFiles(e.target.files)}/>
      <input ref={rf} type="file" multiple={!single} accept="image/*,.heic" style={{display:"none"}} onChange={e=>handleFiles(e.target.files)}/>
    </div>
  );
}

/* ── String row ── */
function StringsTable({strings,onUpdate,onAdd,onDelete}){
  const thSt={color:W,padding:"7px 10px",fontSize:12,fontWeight:700,background:G};
  const tdSt={padding:"4px 8px",border:`1px solid ${BD}`,textAlign:"center"};
  const updStr=(i,k,v)=>onUpdate(strings.map((r,idx)=>idx===i?{...r,[k]:v}:r));
  return(
    <div>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:500}}>
          <thead>
            <tr>
              <th style={{...thSt,textAlign:"left",width:70}}>String</th>
              <th style={thSt}>PE/− (MΩ)</th>
              <th style={thSt}>PE/+ (MΩ)</th>
              <th style={thSt}>Tension est. (V)</th>
              <th style={thSt}>Tension mes. (V)</th>
              <th style={{...thSt,width:36}}></th>
            </tr>
          </thead>
          <tbody>
            {strings.map((s,i)=>{
              const est=parseFloat(s.voltEst),mes=parseFloat(s.voltMes);
              const ecart=(!isNaN(est)&&!isNaN(mes)&&est!==0)?Math.abs((mes-est)/est*100).toFixed(1):null;
              const warn=ecart&&parseFloat(ecart)>5;
              return(
                <tr key={i} style={{background:i%2===0?W:"#fafaf8"}}>
                  <td style={{padding:"5px 8px",border:`1px solid ${BD}`}}>
                    <input type="text" value={s.num} onChange={e=>updStr(i,"num",e.target.value)} style={{width:46,fontWeight:700,color:G,textAlign:"center"}} placeholder={String(i+1)}/>
                  </td>
                  {["isolNeg","isolPos"].map(k=>{
                    const val=s[k],ok=val&&parseFloat(val)>=0.5;
                    return(
                      <td key={k} style={tdSt}>
                        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:3}}>
                          <input type="number" step="any" value={val} onChange={e=>updStr(i,k,e.target.value)} style={{width:64,textAlign:"right"}} placeholder="—"/>
                          <span style={{fontSize:11,color:MU}}>MΩ</span>
                          {val&&<span style={{fontSize:10,fontWeight:700,color:ok?G:RD}}>{ok?"✓":"⚠"}</span>}
                        </div>
                      </td>
                    );
                  })}
                  <td style={tdSt}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:3}}>
                      <input type="number" step="any" value={s.voltEst} onChange={e=>updStr(i,"voltEst",e.target.value)} style={{width:64,textAlign:"right"}} placeholder="—"/>
                      <span style={{fontSize:11,color:MU}}>V</span>
                    </div>
                  </td>
                  <td style={tdSt}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:3}}>
                      <input type="number" step="any" value={s.voltMes} onChange={e=>updStr(i,"voltMes",e.target.value)} style={{width:64,textAlign:"right"}} placeholder="—"/>
                      <span style={{fontSize:11,color:MU}}>V</span>
                      {ecart&&<span style={{fontSize:10,fontWeight:700,color:warn?RD:G}}>{ecart}%</span>}
                    </div>
                  </td>
                  <td style={{padding:"4px",border:`1px solid ${BD}`,textAlign:"center"}}>
                    <button onClick={()=>onDelete(i)} style={{fontSize:15,color:MU,background:"none",border:"none",cursor:"pointer"}}>×</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8,flexWrap:"wrap",gap:8}}>
        <div style={{fontSize:11,color:MU}}>Isolement &gt; 0,5 MΩ = OK · Tension : écart &gt; 5% = rouge</div>
        <button onClick={onAdd} style={{fontSize:12,color:G,background:"none",border:`1px dashed ${GM}`,borderRadius:6,padding:"3px 10px",cursor:"pointer"}}>+ String</button>
      </div>
    </div>
  );
}

/* ── Onduleur card ── */
function OnduleurCard({idx,ond,onChange,onDelete}){
  const [open,setOpen]=useState(true);
  const set=(k,v)=>onChange({...ond,[k]:v});
  const setE=(k,v)=>onChange({...ond,erreur:{...ond.erreur,[k]:v}});
  const allStr=ond.strings||[];
  const mkS=n=>({num:String(n),isolNeg:"",isolPos:"",voltEst:"",voltMes:""});

  // Status color
  const statusColor=ond.etat==="OK"?G:ond.etat==="Erreur"?RD:BD;
  const statusBg=ond.etat==="OK"?GL:ond.etat==="Erreur"?"#fdf0f0":W;

  return(
    <div style={{border:`2px solid ${statusColor}`,borderRadius:10,overflow:"hidden",marginBottom:12}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:open?statusBg:W,cursor:"pointer",borderBottom:open?`1px solid ${statusColor}33`:"none"}} onClick={()=>setOpen(!open)}>
        <div style={{width:28,height:28,borderRadius:"50%",background:statusColor,color:W,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0}}>
          {idx+1}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:600,color:"#1a1a1a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
            {ond.modele||"Onduleur "+(idx+1)}
            {ond.serie&&<span style={{fontSize:12,fontWeight:400,color:MU,marginLeft:8}}>S/N: {ond.serie}</span>}
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center",marginTop:2,flexWrap:"wrap"}}>
            {ond.etat&&<span style={{fontSize:11,fontWeight:700,color:W,background:statusColor,borderRadius:4,padding:"0px 6px"}}>{ond.etat}</span>}
            {ond.erreur&&ond.erreur.code&&<span style={{fontSize:11,color:OR}}>Code: {ond.erreur.code}</span>}
            {ond.majFirmware==="OUI"&&<span style={{fontSize:11,color:BL}}>MAJ: {ond.firmwareVersion||"—"}</span>}
            {ond.erreur&&ond.erreur.redemarrage&&<span style={{fontSize:11,color:G}}>✓ Reboot</span>}
            {ond.stringsOk&&<span style={{fontSize:11,color:G}}>✓ Strings OK</span>}
          </div>
        </div>
        <span style={{fontSize:16,color:MU,transform:open?"rotate(180deg)":"none",transition:"transform .2s",flexShrink:0}}>▾</span>
        <button onClick={e=>{e.stopPropagation();onDelete();}} style={{fontSize:18,color:"#ccc",background:"none",border:"none",cursor:"pointer",padding:"0 2px",flexShrink:0}} title="Supprimer">×</button>
      </div>

      {open&&(
        <div style={{padding:"16px",display:"flex",flexDirection:"column",gap:16}}>

          {/* Identification + fiche */}
          <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:14,alignItems:"start"}}>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div style={G2}>
                <Field label="Modèle" value={ond.modele||""} onChange={v=>set("modele",v)} placeholder="Ex: Deye SUN-8K-SG03LP1"/>
                <Field label="Numéro de série" value={ond.serie||""} onChange={v=>set("serie",v)} placeholder="S/N…"/>
              </div>
              <Field label="Emplacement / repère" value={ond.emplacement||""} onChange={v=>set("emplacement",v)} placeholder="Ex: Local technique R+1"/>
            </div>
            <div style={{minWidth:100}}>
              <div style={{...LBL,marginBottom:4}}>Fiche signalétique</div>
              <PhotoZone single={true} items={ond.photoFiche||[]}
                onAdd={items=>set("photoFiche",(ond.photoFiche||[]).concat(items).slice(0,1))}
                onDelete={()=>set("photoFiche",[])}/>
            </div>
          </div>

          <hr style={{border:"none",borderTop:`1px solid ${BD}`}}/>

          {/* État onduleur */}
          <div>
            <div style={{...LBL,marginBottom:8,fontSize:13,fontWeight:600,color:"#1a1a1a"}}>État de l'onduleur</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>set("etat",ond.etat==="OK"?null:"OK")} style={{
                padding:"8px 20px",borderRadius:8,fontSize:14,fontWeight:700,cursor:"pointer",
                border:`2px solid ${ond.etat==="OK"?G:BD}`,background:ond.etat==="OK"?G:W,color:ond.etat==="OK"?W:MU,
                display:"flex",alignItems:"center",gap:6
              }}>✓ OK</button>
              <button onClick={()=>set("etat",ond.etat==="Erreur"?null:"Erreur")} style={{
                padding:"8px 20px",borderRadius:8,fontSize:14,fontWeight:700,cursor:"pointer",
                border:`2px solid ${ond.etat==="Erreur"?RD:BD}`,background:ond.etat==="Erreur"?RD:W,color:ond.etat==="Erreur"?W:MU,
                display:"flex",alignItems:"center",gap:6
              }}>⚠ Erreur</button>
            </div>
          </div>

          {/* LEDs */}
          <div>
            <div style={{...LBL,marginBottom:8,fontSize:12,fontWeight:600}}>b) État des LEDs <span style={{fontWeight:400,color:MU}}>(cliquer si OK)</span></div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {[["Vert","ledVert",G,"✓ Vert OK"],["Rouge","ledRouge",RD,"● Rouge"],["Bleu","ledBleu",BL,"● Bleu"]].map(([lbl,k,col,chipLbl])=>{
                const val=ond[k];
                return(
                  <button key={k} onClick={()=>set(k,val?"":lbl+" OK")} style={{
                    padding:"7px 14px",borderRadius:8,fontSize:13,fontWeight:val?700:500,cursor:"pointer",
                    border:`2px solid ${val?col:BD}`,background:val?col:W,color:val?W:MU,
                    display:"flex",alignItems:"center",gap:5,transition:"all .15s"
                  }}>
                    <span style={{fontSize:10}}>●</span> {lbl} {val?"✓":"?"}
                  </button>
                );
              })}
            </div>
            {/* Si rouge ou bleu, champ description */}
            {(ond.ledRouge||ond.ledBleu)&&(
              <div style={{marginTop:8,display:"flex",flexDirection:"column",gap:6}}>
                {ond.ledRouge&&<Field label="Description LED Rouge" value={ond.ledRougeDesc||""} onChange={v=>set("ledRougeDesc",v)} placeholder="Description du code/comportement…"/>}
                {ond.ledBleu&&<Field label="Description LED Bleu" value={ond.ledBleuDesc||""} onChange={v=>set("ledBleuDesc",v)} placeholder="Description de l'anomalie de communication…"/>}
              </div>
            )}
          </div>

          {/* Mise à jour firmware */}
          <div>
            <div style={{...LBL,marginBottom:8,fontSize:12,fontWeight:600}}>Mise à jour firmware effectuée</div>
            <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
              <Toggle value={ond.majFirmware||null} onChange={v=>set("majFirmware",v)}/>
              {ond.majFirmware==="OUI"&&(
                <div style={{flex:1,minWidth:180}}>
                  <input value={ond.firmwareVersion||""} onChange={e=>set("firmwareVersion",e.target.value)}
                    placeholder="Version installée (ex: v1.42.00)" style={{width:"100%"}}/>
                </div>
              )}
            </div>
          </div>

          {/* Redémarrage */}
          <div onClick={()=>set("redemarrage",!ond.redemarrage)}
            style={{padding:"10px 14px",background:ond.redemarrage?GL:BG,
              border:`1px solid ${ond.redemarrage?GM:BD}`,borderRadius:8,
              display:"flex",alignItems:"flex-start",gap:10,cursor:"pointer"}}>
            <div style={{width:20,height:20,borderRadius:5,border:`2px solid ${ond.redemarrage?G:BD}`,
              background:ond.redemarrage?G:W,display:"flex",alignItems:"center",
              justifyContent:"center",flexShrink:0,marginTop:1}}>
              {ond.redemarrage&&<span style={{color:W,fontSize:13,fontWeight:700}}>✓</span>}
            </div>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:ond.redemarrage?G:"#1a1a1a"}}>Redémarrage complet attesté</div>
              <div style={{fontSize:11,color:MU,marginTop:1}}>Commutateur DC OFF pendant AC déconnecté — durée &gt; 15 min</div>
            </div>
          </div>

          {/* Rapport d'erreur — visible seulement si état = Erreur */}
          {ond.etat==="Erreur"&&(
            <div style={{background:"#fff8f5",border:`1px solid ${RD}33`,borderRadius:8,padding:14,display:"flex",flexDirection:"column",gap:12}}>
              <div style={{fontSize:12,fontWeight:700,color:RD,textTransform:"uppercase",letterSpacing:"0.06em"}}>Rapport d'erreur</div>

              <div>
                <label style={LBL}>a) Description du problème</label>
                <textarea value={(ond.erreur&&ond.erreur.description)||""} onChange={e=>setE("description",e.target.value)}
                  rows={3} style={{width:"100%",resize:"vertical"}} placeholder="Comportement anormal observé…"/>
              </div>

              <Field label="c) Message / Code d'erreur onduleur" value={(ond.erreur&&ond.erreur.code)||""}
                onChange={v=>setE("code",v)} placeholder="Ex: E027, Grid fault…"/>

              <div>
                <label style={LBL}>d) Opérations déjà réalisées</label>
                <textarea value={(ond.erreur&&ond.erreur.operations)||""} onChange={e=>setE("operations",e.target.value)}
                  rows={2} style={{width:"100%",resize:"vertical"}} placeholder="Actions déjà tentées…"/>
              </div>

              <PhotoZone label="Photos erreur / LEDs" items={ond.photosErreur||[]}
                onAdd={items=>set("photosErreur",(ond.photosErreur||[]).concat(items))}
                onDelete={i=>set("photosErreur",(ond.photosErreur||[]).filter((_,idx)=>idx!==i))}/>
            </div>
          )}

          {/* Mesures AC */}
          <div>
            <div style={{fontSize:12,fontWeight:700,color:G,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:10,paddingBottom:6,borderBottom:`1px solid ${GM}`}}>
              Mesures AC
            </div>
            <div style={G2}>
              <div>
                <div style={{fontSize:11,fontWeight:600,color:MU,marginBottom:7}}>Isolement AC <span style={{fontWeight:400}}>(seuil &gt; 0,5 MΩ)</span></div>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <tbody>
                    {[["L1/PE","acL1pe"],["L2/PE","acL2pe"],["L3/PE","acL3pe"],["N/PE","acNpe"]].map(([lbl,k])=>{
                      const val=(ond.ac||{})[k]||"";
                      const ok=val&&parseFloat(val)>=0.5;
                      return(
                        <tr key={k}>
                          <td style={{fontWeight:500,padding:"5px 8px",border:`1px solid ${BD}`,width:"30%",fontSize:12}}>{lbl}</td>
                          <td style={{padding:"3px 8px",border:`1px solid ${BD}`}}>
                            <div style={{display:"flex",alignItems:"center",gap:5}}>
                              <input type="number" step="any" value={val} onChange={e=>set("ac",{...(ond.ac||{}),[k]:e.target.value})} placeholder="—" style={{width:74,textAlign:"right"}}/>
                              <span style={{fontSize:11,color:MU}}>MΩ</span>
                              {val&&<span style={{fontSize:10,fontWeight:700,color:W,background:ok?G:RD,borderRadius:3,padding:"0 4px"}}>{ok?"OK":"⚠"}</span>}
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <div>
                <div style={{fontSize:11,fontWeight:600,color:MU,marginBottom:7}}>Voltage AC</div>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <tbody>
                    {[["L1/N","vL1n"],["L2/N","vL2n"],["L3/N","vL3n"],["L1/PE","vL1pe"],["L2/PE","vL2pe"],["L3/PE","vL3pe"],["N/PE","vNpe"],["L1/L2","vL1L2"],["L2/L3","vL2L3"],["L1/L3","vL1L3"]].map(([lbl,k])=>{
                      const val=(ond.ac||{})[k]||"";
                      return(
                        <tr key={k}>
                          <td style={{fontWeight:500,padding:"4px 8px",border:`1px solid ${BD}`,width:"30%",fontSize:12}}>{lbl}</td>
                          <td style={{padding:"3px 8px",border:`1px solid ${BD}`}}>
                            <div style={{display:"flex",alignItems:"center",gap:5}}>
                              <input type="number" step="any" value={val} onChange={e=>set("ac",{...(ond.ac||{}),[k]:e.target.value})} placeholder="—" style={{width:74,textAlign:"right"}}/>
                              <span style={{fontSize:11,color:MU}}>V</span>
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
            <div style={{marginTop:10,display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,alignItems:"start"}}>
              <div>
                <label style={LBL}>Remarques AC</label>
                <textarea value={(ond.ac&&ond.ac.remarques)||""} onChange={e=>set("ac",{...(ond.ac||{}),remarques:e.target.value})}
                  rows={2} style={{width:"100%",resize:"vertical"}} placeholder="Observations…"/>
              </div>
              <PhotoZone label="Photos AC" items={ond.photosAc||[]}
                onAdd={items=>set("photosAc",(ond.photosAc||[]).concat(items))}
                onDelete={i=>set("photosAc",(ond.photosAc||[]).filter((_,idx)=>idx!==i))}/>
            </div>
          </div>

          {/* Strings DC */}
          <div>
            <div style={{fontSize:12,fontWeight:700,color:G,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:10,paddingBottom:6,borderBottom:`1px solid ${GM}`}}>
              Mesures DC — Strings
            </div>
            <StringsTable
              strings={allStr}
              onUpdate={v=>set("strings",v)}
              onAdd={()=>set("strings",[...allStr,mkS(allStr.length+1)])}
              onDelete={i=>set("strings",allStr.filter((_,idx)=>idx!==i))}/>
            <div style={{marginTop:12,display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,alignItems:"start"}}>
              <div>
                <label style={LBL}>Remarques DC</label>
                <textarea value={ond.dcRemarques||""} onChange={e=>set("dcRemarques",e.target.value)}
                  rows={2} style={{width:"100%",resize:"vertical"}} placeholder="Observations DC…"/>
              </div>
              <PhotoZone label="Photos DC" items={ond.photosDc||[]}
                onAdd={items=>set("photosDc",(ond.photosDc||[]).concat(items))}
                onDelete={i=>set("photosDc",(ond.photosDc||[]).filter((_,idx)=>idx!==i))}/>
            </div>
            {/* Strings OK checkbox */}
            <div onClick={()=>set("stringsOk",!ond.stringsOk)}
              style={{marginTop:10,padding:"9px 14px",background:ond.stringsOk?GL:BG,
                border:`1.5px solid ${ond.stringsOk?G:BD}`,borderRadius:8,
                display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
              <div style={{width:20,height:20,borderRadius:5,border:`2px solid ${ond.stringsOk?G:BD}`,
                background:ond.stringsOk?G:W,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {ond.stringsOk&&<span style={{color:W,fontSize:13,fontWeight:700}}>✓</span>}
              </div>
              <div style={{fontSize:13,fontWeight:ond.stringsOk?700:500,color:ond.stringsOk?G:"#1a1a1a"}}>
                Strings OK — toutes les mesures DC sont conformes
              </div>
            </div>
          </div>

        </div>
      )}
    </div>
  );
}

/* ── Preview ── */
function PreviewDoc({data}){
  const tv=v=>v||"—";
  return(
    <div id="preview-doc" style={{maxWidth:720,margin:"0 auto",padding:"1rem .5rem",fontSize:13,lineHeight:1.6}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,paddingBottom:14,borderBottom:`2px solid ${G}`}}>
        <div>
          <div style={{fontSize:11,fontWeight:700,color:G,textTransform:"uppercase",letterSpacing:"0.08em"}}>We Green Energy</div>
          <div style={{fontSize:22,fontWeight:700}}>Rapport de maintenance onduleur</div>
          {data.meta.client&&<div style={{fontSize:14,color:MU,marginTop:2}}>{data.meta.client}</div>}
        </div>
        <div style={{textAlign:"right",fontSize:12,color:MU}}>
          <div style={{fontWeight:600,color:"#1a1a1a"}}>{tv(data.meta.date)}</div>
          <div>{tv(data.meta.responsable)}</div>
        </div>
      </div>

      {/* Identification */}
      <div style={{marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:700,color:G,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>Identification</div>
        <table className="pv-table"><tbody>
          <tr><th>Client</th><td>{tv(data.meta.client)}</td></tr>
          <tr><th>Adresse</th><td>{tv(data.meta.adresse)}</td></tr>
          <tr><th>Responsable</th><td>{tv(data.meta.responsable)}</td></tr>
          <tr><th>Date</th><td>{tv(data.meta.date)}</td></tr>
          <tr><th>Onduleurs</th><td>{data.onduleurs.length} — {data.onduleurs.filter(o=>o.etat==="OK").length} OK / {data.onduleurs.filter(o=>o.etat==="Erreur").length} en erreur</td></tr>
        </tbody></table>
      </div>

      {/* Par onduleur */}
      {data.onduleurs.map((ond,idx)=>{
        const sc=ond.etat==="OK"?G:ond.etat==="Erreur"?RD:MU;
        return(
          <div key={idx} className="page-break" style={{marginBottom:20}}>
            <div style={{background:sc,color:W,borderRadius:"8px 8px 0 0",padding:"8px 14px",display:"flex",alignItems:"center",gap:10}}>
              <span style={{width:22,height:22,borderRadius:"50%",background:"rgba(255,255,255,0.25)",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700}}>{idx+1}</span>
              <span style={{fontWeight:700}}>{ond.modele||"Onduleur "+(idx+1)}</span>
              {ond.serie&&<span style={{fontSize:11,opacity:.8}}>S/N: {ond.serie}</span>}
              {ond.etat&&<span style={{marginLeft:"auto",fontSize:12,fontWeight:700,background:"rgba(255,255,255,0.2)",padding:"1px 8px",borderRadius:4}}>{ond.etat}</span>}
            </div>
            <div style={{border:`1px solid ${sc}44`,borderTop:"none",borderRadius:"0 0 8px 8px",padding:12}}>
              {/* Photo fiche + infos */}
              <div style={{display:"flex",gap:12,marginBottom:10,alignItems:"flex-start"}}>
                {ond.photoFiche&&ond.photoFiche.length>0&&<img src={ond.photoFiche[0].url} alt="Fiche" style={{width:90,height:90,objectFit:"cover",borderRadius:6,border:`1px solid ${BD}`,flexShrink:0}}/>}
                <table className="pv-table" style={{flex:1}}><tbody>
                  {ond.emplacement&&<tr><th>Emplacement</th><td>{ond.emplacement}</td></tr>}
                  <tr><th>État</th><td style={{fontWeight:700,color:sc}}>{tv(ond.etat)}</td></tr>
                  <tr><th>LEDs</th><td>
                    {ond.ledVert&&<span style={{marginRight:8,color:G,fontWeight:600}}>● Vert ✓</span>}
                    {ond.ledRouge&&<span style={{marginRight:8,color:RD,fontWeight:600}}>● Rouge {ond.ledRougeDesc?" — "+ond.ledRougeDesc:""}</span>}
                    {ond.ledBleu&&<span style={{color:BL,fontWeight:600}}>● Bleu {ond.ledBleuDesc?" — "+ond.ledBleuDesc:""}</span>}
                    {!ond.ledVert&&!ond.ledRouge&&!ond.ledBleu&&"—"}
                  </td></tr>
                  <tr><th>Mise à jour firmware</th><td>{ond.majFirmware==="OUI"?("OUI — "+(ond.firmwareVersion||"version non renseignée")):(ond.majFirmware||"—")}</td></tr>
                  <tr><th>Redémarrage &gt;15 min</th><td style={{fontWeight:600,color:ond.redemarrage?G:MU}}>{ond.redemarrage?"✓ Attesté":"Non"}</td></tr>
                </tbody></table>
              </div>

              {/* Rapport erreur si erreur */}
              {ond.etat==="Erreur"&&(
                <div style={{marginBottom:10}}>
                  <table className="pv-table"><tbody>
                    <tr><th>Description</th><td style={{whiteSpace:"pre-wrap"}}>{(ond.erreur&&ond.erreur.description)||"—"}</td></tr>
                    <tr><th>Code erreur</th><td>{(ond.erreur&&ond.erreur.code)||"—"}</td></tr>
                    <tr><th>Opérations</th><td style={{whiteSpace:"pre-wrap"}}>{(ond.erreur&&ond.erreur.operations)||"—"}</td></tr>
                  </tbody></table>
                  {ond.photosErreur&&ond.photosErreur.length>0&&(
                    <div style={{marginTop:8,display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:6}}>
                      {ond.photosErreur.map((p,i)=><img key={i} src={p.url} alt={p.name} style={{width:"100%",aspectRatio:"4/3",objectFit:"cover",borderRadius:5,border:`1px solid ${BD}`}}/>)}
                    </div>
                  )}
                </div>
              )}

              {/* AC */}
              {(ond.ac&&Object.values(ond.ac).some(v=>v))&&(
                <div style={{marginBottom:10}}>
                  <div style={{fontSize:11,fontWeight:700,color:G,textTransform:"uppercase",marginBottom:6}}>Mesures AC</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    <table className="pv-table"><tbody>
                      {[["L1/PE","acL1pe"],["L2/PE","acL2pe"],["L3/PE","acL3pe"],["N/PE","acNpe"]].map(([l,k])=>(
                        <tr key={k}><th>{l}</th><td>{(ond.ac&&ond.ac[k])?ond.ac[k]+" MΩ":"—"}</td></tr>
                      ))}
                    </tbody></table>
                    <table className="pv-table"><tbody>
                      {[["L1/N","vL1n"],["L2/N","vL2n"],["L3/N","vL3n"],["L1/L2","vL1L2"],["L2/L3","vL2L3"],["L1/L3","vL1L3"]].map(([l,k])=>(
                        <tr key={k}><th>{l}</th><td>{(ond.ac&&ond.ac[k])?ond.ac[k]+" V":"—"}</td></tr>
                      ))}
                    </tbody></table>
                  </div>
                  {ond.ac&&ond.ac.remarques&&<div style={{marginTop:6,fontSize:12,color:MU}}><strong>Remarques :</strong> {ond.ac.remarques}</div>}
                </div>
              )}

              {/* DC strings */}
              {ond.strings&&ond.strings.some(s=>s.isolNeg||s.isolPos||s.voltMes)&&(
                <div>
                  <div style={{fontSize:11,fontWeight:700,color:G,textTransform:"uppercase",marginBottom:6}}>Mesures DC — Strings</div>
                  <table className="ms-table">
                    <thead><tr><th>String</th><th>PE/− (MΩ)</th><th>PE/+ (MΩ)</th><th>Estimé (V)</th><th>Mesuré (V)</th><th>Statut</th></tr></thead>
                    <tbody>
                      {ond.strings.filter(s=>s.isolNeg||s.isolPos||s.voltMes).map((s,i)=>{
                        const isolOk=parseFloat(s.isolNeg)>=0.5&&parseFloat(s.isolPos)>=0.5;
                        const est=parseFloat(s.voltEst),mes=parseFloat(s.voltMes);
                        const ecart=(!isNaN(est)&&!isNaN(mes)&&est!==0)?Math.abs((mes-est)/est*100).toFixed(1):null;
                        const warn=ecart&&parseFloat(ecart)>5;
                        return(
                          <tr key={i}>
                            <td style={{fontWeight:600}}>STR {s.num}</td>
                            <td>{s.isolNeg||"—"}</td><td>{s.isolPos||"—"}</td>
                            <td>{s.voltEst||"—"}</td>
                            <td>{s.voltMes||"—"}{ecart&&<span style={{marginLeft:4,color:warn?RD:G,fontWeight:600}}>{ecart}%</span>}</td>
                            <td><span style={{fontSize:10,fontWeight:700,color:W,background:(s.isolNeg&&s.isolPos)?(isolOk?G:RD):"#aaa",borderRadius:3,padding:"0 5px"}}>{(s.isolNeg&&s.isolPos)?(isolOk?"OK":"⚠"):"—"}</span></td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                  {ond.stringsOk&&<div style={{marginTop:6,fontSize:12,fontWeight:600,color:G}}>✓ Toutes les mesures DC sont conformes</div>}
                  {ond.dcRemarques&&<div style={{marginTop:4,fontSize:12,color:MU}}><strong>Remarques :</strong> {ond.dcRemarques}</div>}
                </div>
              )}
              {ond.stringsOk&&(!ond.strings||!ond.strings.some(s=>s.isolNeg||s.isolPos||s.voltMes))&&(
                <div style={{fontSize:12,fontWeight:600,color:G}}>✓ Strings OK — mesures conformes</div>
              )}

            </div>
          </div>
        );
      })}

      {/* Photos générales */}
      {data.photos.general&&data.photos.general.length>0&&(
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:600,marginBottom:8}}>Photos générales</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8}}>
            {data.photos.general.map((p,i)=><img key={i} src={p.url} alt={p.name} style={{width:"100%",aspectRatio:"4/3",objectFit:"cover",borderRadius:6,border:`1px solid ${BD}`}}/>)}
          </div>
        </div>
      )}
    </div>
  );
}

/* ── App ── */
function mkOnd(n){
  return{id:Date.now()+n,modele:"",serie:"",emplacement:"",photoFiche:[],photosErreur:[],photosAc:[],photosDc:[],
    etat:null,ledVert:"",ledRouge:"",ledBleu:"",ledRougeDesc:"",ledBleuDesc:"",
    majFirmware:null,firmwareVersion:"",redemarrage:false,stringsOk:false,
    ac:{},strings:[{num:"1",isolNeg:"",isolPos:"",voltEst:"",voltMes:""}],dcRemarques:"",
    erreur:{description:"",code:"",operations:""}};
}

function App(){
  const [mode,setMode]=useState("form");
  const [ref,setRef]=useState("");
  const [saveStatus,setSaveStatus]=useState("");
  const [lastSaved,setLastSaved]=useState(null);
  const saveTimer=useRef(null);
  const isLoading=useRef(false);

  const [meta,setMeta]=useState({client:"",adresse:"",responsable:"",date:""});
  const [onduleurs,setOnduleurs]=useState([mkOnd(0)]);
  const [photos,setPhotos]=useState({general:[]});

  const data={meta,onduleurs,photos};

  useEffect(()=>{
    const urlRef=new URLSearchParams(window.location.search).get("ref");
    if(!urlRef)return;
    setRef(urlRef);setSaveStatus("loading");
    supaLoad(urlRef).then(row=>{
      if(!row?.data){setSaveStatus("");return;}
      isLoading.current=true;
      const d=row.data;
      if(d.meta)setMeta(d.meta);
      if(d.onduleurs)setOnduleurs(d.onduleurs);
      if(d.photos)setPhotos(d.photos);
      setLastSaved(row.updated_at);setSaveStatus("saved");
      setTimeout(()=>{isLoading.current=false;},100);
    });
  },[]);

  const doSave=delay=>{
    if(!ref||isLoading.current)return;
    if(saveTimer.current)clearTimeout(saveTimer.current);
    setSaveStatus("saving");
    saveTimer.current=setTimeout(()=>{
      supaSave(ref,data).then(ok=>{
        if(ok){setLastSaved(new Date().toISOString());setSaveStatus("saved");}
        else setSaveStatus("error");
      });
    },delay||1400);
  };
  useEffect(()=>doSave(1400),[meta,onduleurs]);
  useEffect(()=>doSave(2000),[photos]);

  const updOnd=(i,val)=>setOnduleurs(p=>p.map((o,idx)=>idx===i?val:o));
  const addOnd=()=>setOnduleurs(p=>[...p,mkOnd(p.length)]);
  const delOnd=i=>setOnduleurs(p=>p.filter((_,idx)=>idx!==i));
  const addPhotos=(key,items)=>setPhotos(p=>({...p,[key]:p[key].concat(items)}));
  const delPhoto=(key,i)=>setPhotos(p=>({...p,[key]:p[key].filter((_,idx)=>idx!==i)}));

  const saveLabel=()=>{
    if(saveStatus==="saving")return"⏳ Sauvegarde…";
    if(saveStatus==="loading")return"⏳ Chargement…";
    if(saveStatus==="error")return"⚠ Erreur de sauvegarde";
    if(saveStatus==="saved"&&lastSaved){
      const diff=Math.round((new Date()-new Date(lastSaved))/1000);
      if(diff<60)return"✓ Sauvegardé";
      return"✓ "+new Date(lastSaved).toLocaleTimeString("fr-BE",{hour:"2-digit",minute:"2-digit"});
    }
    return"";
  };
  const btnSt=active=>({padding:"7px 16px",borderRadius:7,background:active?GL:W,color:active?G:MU,border:`1px solid ${active?GM:BD}`,fontSize:13,fontWeight:active?600:400,cursor:"pointer"});

  return(
    <div style={{maxWidth:980,margin:"0 auto",padding:"1rem .75rem",display:"flex",flexDirection:"column",gap:14}}>

      <div id="no-print" style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontSize:11,fontWeight:700,color:G,textTransform:"uppercase",letterSpacing:"0.08em"}}>We Green Energy</div>
          <div style={{fontSize:20,fontWeight:700}}>
            Maintenance Onduleur
            {ref&&<span style={{fontSize:14,fontWeight:400,color:MU,marginLeft:10}}>— {ref}</span>}
          </div>
          {!ref&&<div style={{fontSize:11,color:OR,marginTop:2}}>⚠ Ajoutez ?ref=S0XXXX dans l'URL pour activer la sauvegarde</div>}
          {ref&&<div style={{fontSize:11,marginTop:2,color:saveStatus==="error"?RD:saveStatus==="saved"?G:MU}}>{saveLabel()}</div>}
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          <div style={{display:"flex",border:`1px solid ${BD}`,borderRadius:8,overflow:"hidden"}}>
            <button onClick={()=>setMode("form")} style={{...btnSt(mode==="form"),borderRadius:0,border:"none",borderRight:`1px solid ${BD}`}}>Formulaire</button>
            <button onClick={()=>setMode("preview")} style={{...btnSt(mode==="preview"),borderRadius:0,border:"none"}}>Aperçu</button>
          </div>
          {mode==="preview"&&<button onClick={()=>window.print()} style={btnSt(false)}>⬇ PDF</button>}
        </div>
      </div>

      {mode==="preview"?<PreviewDoc data={data}/>:(
        <React.Fragment>

          {/* Identification */}
          <div style={CARD}>
            <div style={SH}>Identification du projet</div>
            <div style={G2}>
              <Field label="Nom du client" value={meta.client} onChange={v=>setMeta(p=>({...p,client:v}))} placeholder="Société ou particulier"/>
              <Field label="Adresse du chantier" value={meta.adresse} onChange={v=>setMeta(p=>({...p,adresse:v}))} placeholder="Rue, numéro, CP, ville"/>
              <Field label="Responsable de la mesure" value={meta.responsable} onChange={v=>setMeta(p=>({...p,responsable:v}))} placeholder="Prénom Nom"/>
              <Field label="Date d'intervention" value={meta.date} onChange={v=>setMeta(p=>({...p,date:v}))} type="date"/>
            </div>
          </div>

          {/* Onduleurs */}
          <div style={CARD}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{...SH,marginBottom:0,paddingBottom:0,borderBottom:"none"}}>
                Onduleurs
                <span style={{marginLeft:10,fontSize:12,fontWeight:400,color:MU,textTransform:"none",letterSpacing:"normal"}}>
                  {onduleurs.length} onduleur{onduleurs.length>1?"s":""}
                  {onduleurs.filter(o=>o.etat==="OK").length>0&&<span style={{marginLeft:6,color:G,fontWeight:600}}>{onduleurs.filter(o=>o.etat==="OK").length} OK</span>}
                  {onduleurs.filter(o=>o.etat==="Erreur").length>0&&<span style={{marginLeft:6,color:RD,fontWeight:600}}>{onduleurs.filter(o=>o.etat==="Erreur").length} en erreur</span>}
                </span>
              </div>
              <button onClick={addOnd} style={{background:G,color:W,border:"none",borderRadius:8,padding:"7px 16px",fontSize:13,fontWeight:600,cursor:"pointer"}}>+ Onduleur</button>
            </div>
            {onduleurs.map((ond,i)=>(
              <OnduleurCard key={ond.id||i} idx={i} ond={ond}
                onChange={val=>updOnd(i,val)}
                onDelete={()=>delOnd(i)}/>
            ))}
          </div>

          {/* Photos générales */}
          <div style={CARD}>
            <div style={SH}>Photos générales / pièces jointes</div>
            <div style={{fontSize:12,color:MU,marginBottom:10}}>Captures d'écran monitoring, journal, paramètres…</div>
            <PhotoZone label="" items={photos.general} onAdd={items=>addPhotos("general",items)} onDelete={i=>delPhoto("general",i)}/>
          </div>

        </React.Fragment>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
